apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencut.fullname" . }}-postgres
  labels:
    {{- include "opencut.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None  # headless — required for StatefulSet DNS
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    {{- include "opencut.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
