apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencut.fullname" . }}-redis
  labels:
    {{- include "opencut.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  clusterIP: None  # headless — required for StatefulSet DNS
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    {{- include "opencut.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
