apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencut.fullname" . }}-web
  labels:
    {{- include "opencut.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "opencut.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "opencut.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "opencut.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "opencut.fullname" . }}-postgres 5432; do
                echo "waiting for postgres..."; sleep 2
              done
        - name: wait-for-srh
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "opencut.fullname" . }}-srh 80; do
                echo "waiting for srh..."; sleep 2
              done
      containers:
        - name: web
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          envFrom:
            - configMapRef:
                name: {{ include "opencut.fullname" . }}-config
            - secretRef:
                name: {{ include "opencut.fullname" . }}-secrets
          env:
            - name: DATABASE_URL
              value: {{ printf "postgresql://$(POSTGRES_USER):$(DB_PASSWORD)@%s-postgres:5432/$(POSTGRES_DB)" (include "opencut.fullname" .) | quote }}
            - name: UPSTASH_REDIS_REST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "opencut.fullname" . }}-secrets
                  key: SRH_TOKEN
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.web.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.web.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
